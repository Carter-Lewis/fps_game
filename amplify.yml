version: 1
frontend:
  phases:
    build:
      commands:
        - echo "Static Godot web export — no build required"
  artifacts:
    baseDirectory: /
    files:
      - "**/*"
  cache:
    paths: []
  customHeaders:
    - pattern: "**/*"
      headers:
        - key: Cross-Origin-Opener-Policy
          value: same-origin
        - key: Cross-Origin-Embedder-Policy
          value: require-corp
